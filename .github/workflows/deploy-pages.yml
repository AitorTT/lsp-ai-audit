name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'packages/web/**'
      - 'packages/ui/**'
      - 'packages/shared/**'
      - 'packages/viz/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare static export
        run: |
          rm -rf packages/web/src/app/\(portal\)
          cat > packages/web/next.config.js << 'EOF'
          /** @type {import('next').NextConfig} */
          const nextConfig = {
            output: 'export',
            images: { unoptimized: true },
            transpilePackages: ['@lsp/ui', '@lsp/shared', '@lsp/viz'],
            webpack: (config) => {
              config.resolve.fallback = { fs: false, path: false, crypto: false };
              return config;
            },
          };
          module.exports = nextConfig;
          EOF

      - name: Build site
        run: pnpm build --filter=@lsp/web
        env:
          NODE_ENV: production

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./packages/web/out
          force_orphan: true
