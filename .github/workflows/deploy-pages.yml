name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'packages/web/**'
      - 'packages/ui/**'
      - 'packages/shared/**'
      - 'packages/viz/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare static export
        run: |
          rm -rf packages/web/src/app/\(portal\)
          cat > packages/web/next.config.js << 'EOF'
          /** @type {import('next').NextConfig} */
          const nextConfig = {
            basePath: '/lsp-ai-audit',
            output: 'export',
            images: { unoptimized: true },
            transpilePackages: ['@lsp/ui', '@lsp/shared', '@lsp/viz'],
            webpack: (config) => {
              config.resolve.fallback = { fs: false, path: false, crypto: false };
              return config;
            },
          };
          module.exports = nextConfig;
          EOF

      - name: Build site
        run: pnpm build --filter=@lsp/web
        env:
          NODE_ENV: production

      - name: Verify output
        run: |
          ls -la packages/web/out/
          cat packages/web/out/index.html | head -5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
