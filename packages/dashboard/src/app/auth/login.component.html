<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <div class="logo">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <rect width="40" height="40" rx="10" fill="#1a56db"/>
          <path d="M12 28V12h6a6 6 0 010 12h-6" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M18 20h10a4 4 0 010 8H18" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1>LSP AI Audit</h1>
      <p class="subtitle">Admin Dashboard</p>
    </div>
    <form (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" name="email" [(ngModel)]="email" required placeholder="Enter your email" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" name="password" [(ngModel)]="password" required placeholder="Enter your password" autocomplete="current-password">
      </div>
      <p *ngIf="error" class="error-message">{{ error }}</p>
      <button type="submit" class="btn btn-primary" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>
  </div>
</div>
